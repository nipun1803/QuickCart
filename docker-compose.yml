services:
  # The Backend API (Node.js)
  backend-api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=development
      - PORT=5001

  # The Frontend UI (Node.js / React)
  frontend-ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5001/api
    depends_on:
      - backend-api