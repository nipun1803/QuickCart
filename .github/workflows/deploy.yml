name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Navigate to the project directory on EC2
            cd ~/QuickCart || git clone https://github.com/nipun1803/QuickCart.git ~/QuickCart && cd ~/QuickCart
            
            # Pull the latest code
            git pull origin main
            
            # Install backend dependencies and restart the server
            cd backend
            npm install --production
            pm2 restart quickcart-backend || pm2 start server.js --name quickcart-backend
            
            # Install frontend dependencies and build
            cd ../frontend
            npm install
            npm run build
            
            echo "🚀 Deployment successfully completed!"