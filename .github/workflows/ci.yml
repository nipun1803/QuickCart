name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run linter
        run: npm run lint
        working-directory: ./frontend

      - name: Install test dependencies
        run: npm ci
        working-directory: ./tests

      # Generate JUnit report
      - name: Run frontend unit tests
        run: npm run test:unit:frontend -- --reporter=junit --outputFile=frontend-unit-results.xml
        working-directory: ./tests

      - name: Build
        run: npm run build
        working-directory: ./frontend

      # Upload test report artifact
      - name: Upload frontend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: tests/frontend-unit-results.xml
          retention-days: 7

  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PORT: 5001
      MONGODB_URI: mongodb://127.0.0.1:27017/testdb
      JWT_SECRET: testsecret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: ./backend

      - name: Run linter
        run: npm run lint
        working-directory: ./backend

      - name: Install test dependencies
        run: npm ci
        working-directory: ./tests

      # Generate JUnit report
      - name: Run backend unit tests
        run: npm run test:unit:backend -- --reporter=junit --outputFile=backend-unit-results.xml
        working-directory: ./tests

      # Upload test report artifact
      - name: Upload backend test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: tests/backend-unit-results.xml
          retention-days: 7
