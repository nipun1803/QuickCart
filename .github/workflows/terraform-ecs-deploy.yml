# =============================================================================
# QuickCart — Full CI/CD Pipeline: Test → Terraform → Build → Deploy
# =============================================================================
# Required GitHub Secrets:
#   - AWS_ACCESS_KEY_ID
#   - AWS_SECRET_ACCESS_KEY
#   - AWS_SESSION_TOKEN
#   - AWS_REGION
# =============================================================================

name: Terraform + ECS Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  PROJECT_NAME: quickcart
  TF_STATE_BUCKET: quickcart-tfstate-nipun1803
  TF_LOCK_TABLE: quickcart-terraform-locks

jobs:
  # =========================================================================
  # Phase 1 — Testing (Unit + Integration)
  # =========================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PORT: 5001
      MONGODB_URI: mongodb://127.0.0.1:27017/testdb
      JWT_SECRET: testsecret
      GOOGLE_CLIENT_ID: test
      GOOGLE_CLIENT_SECRET: test
      NODE_ENV: test
      SESSION_SECRET: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install all dependencies
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend
          npm ci --prefix tests

      # --- Unit Tests ---

      - name: Run backend unit tests
        run: npm run test:unit:backend -- --reporter=junit --outputFile=backend-unit-results.xml
        working-directory: ./tests
        continue-on-error: false

      - name: Run frontend unit tests
        run: npm run test:unit:frontend -- --reporter=junit --outputFile=frontend-unit-results.xml
        working-directory: ./tests
        continue-on-error: false

      # --- Integration Tests ---

      - name: Run integration tests
        run: npm run test:integration -- --reporter=junit --outputFile=integration-results.xml
        working-directory: ./tests
        continue-on-error: false

      # --- Upload Test Reports ---

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            tests/*-results.xml
          retention-days: 7

      - name: Build frontend (verify build)
        run: npm run build --prefix frontend

  # =========================================================================
  # Phase 2 — Infrastructure Provisioning (Terraform)
  # =========================================================================
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: ./terraform

    outputs:
      ecr_backend_url: ${{ steps.tf_output.outputs.ecr_backend_url }}
      ecr_frontend_url: ${{ steps.tf_output.outputs.ecr_frontend_url }}
      ecs_cluster_name: ${{ steps.tf_output.outputs.ecs_cluster_name }}
      ecs_backend_service: ${{ steps.tf_output.outputs.ecs_backend_service }}
      ecs_frontend_service: ${{ steps.tf_output.outputs.ecs_frontend_service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Bootstrap S3 Backend (versioning, encryption, public access blocked) ---

      - name: Create S3 bucket for Terraform state (if not exists)
        working-directory: .
        run: |
          if ! aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "📦 Creating S3 bucket: $TF_STATE_BUCKET"
            aws s3api create-bucket \
              --bucket "$TF_STATE_BUCKET" \
              --region "$AWS_REGION"

            # Enable versioning
            aws s3api put-bucket-versioning \
              --bucket "$TF_STATE_BUCKET" \
              --versioning-configuration Status=Enabled

            # Enable server-side encryption (AES-256)
            aws s3api put-bucket-encryption \
              --bucket "$TF_STATE_BUCKET" \
              --server-side-encryption-configuration '{
                "Rules": [
                  {
                    "ApplyServerSideEncryptionByDefault": {
                      "SSEAlgorithm": "AES256"
                    },
                    "BucketKeyEnabled": true
                  }
                ]
              }'

            # Block ALL public access
            aws s3api put-public-access-block \
              --bucket "$TF_STATE_BUCKET" \
              --public-access-block-configuration '{
                "BlockPublicAcls": true,
                "IgnorePublicAcls": true,
                "BlockPublicPolicy": true,
                "RestrictPublicBuckets": true
              }'

            echo "✅ S3 bucket created and configured"
          else
            echo "✅ S3 bucket already exists"
          fi

      - name: Create DynamoDB table for state locking (if not exists)
        working-directory: .
        run: |
          if ! aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION" 2>/dev/null; then
            echo "🔒 Creating DynamoDB lock table: $TF_LOCK_TABLE"
            aws dynamodb create-table \
              --table-name "$TF_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"

            aws dynamodb wait table-exists --table-name "$TF_LOCK_TABLE" --region "$AWS_REGION"
            echo "✅ DynamoDB table created"
          else
            echo "✅ DynamoDB table already exists"
          fi

      # --- Terraform Workflow ---

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -var="project_name=${{ env.PROJECT_NAME }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="session_secret=${{ secrets.SESSION_SECRET }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform Outputs
        id: tf_output
        run: |
          echo "ecr_backend_url=$(terraform output -raw ecr_backend_repository_url)" >> $GITHUB_OUTPUT
          echo "ecr_frontend_url=$(terraform output -raw ecr_frontend_repository_url)" >> $GITHUB_OUTPUT
          echo "ecs_cluster_name=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "ecs_backend_service=$(terraform output -raw ecs_backend_service_name)" >> $GITHUB_OUTPUT
          echo "ecs_frontend_service=$(terraform output -raw ecs_frontend_service_name)" >> $GITHUB_OUTPUT

      - name: Print Application URL
        run: |
          echo "==========================================="
          echo "🚀 Application URL: http://$(terraform output -raw alb_dns_name)"
          echo "==========================================="

  # =========================================================================
  # Phase 3 — Container Build & ECS Deployment
  # =========================================================================
  deploy:
    name: Build & Deploy to ECS
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr_login
        uses: aws-actions/amazon-ecr-login@v2

      # --- Build & Push Backend ---

      - name: Build backend Docker image
        run: |
          docker build ./backend \
            -t ${{ needs.terraform.outputs.ecr_backend_url }}:${{ github.sha }} \
            -t ${{ needs.terraform.outputs.ecr_backend_url }}:latest

      - name: Push backend image to ECR
        run: |
          docker push ${{ needs.terraform.outputs.ecr_backend_url }}:${{ github.sha }}
          docker push ${{ needs.terraform.outputs.ecr_backend_url }}:latest

      # --- Build & Push Frontend ---

      - name: Build frontend Docker image
        run: |
          docker build ./frontend \
            -t ${{ needs.terraform.outputs.ecr_frontend_url }}:${{ github.sha }} \
            -t ${{ needs.terraform.outputs.ecr_frontend_url }}:latest

      - name: Push frontend image to ECR
        run: |
          docker push ${{ needs.terraform.outputs.ecr_frontend_url }}:${{ github.sha }}
          docker push ${{ needs.terraform.outputs.ecr_frontend_url }}:latest

      # --- Deploy to ECS Fargate ---

      - name: Deploy backend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ needs.terraform.outputs.ecs_cluster_name }} \
            --service ${{ needs.terraform.outputs.ecs_backend_service }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy frontend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ needs.terraform.outputs.ecs_cluster_name }} \
            --service ${{ needs.terraform.outputs.ecs_frontend_service }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for backend service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ needs.terraform.outputs.ecs_cluster_name }} \
            --services ${{ needs.terraform.outputs.ecs_backend_service }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for frontend service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ needs.terraform.outputs.ecs_cluster_name }} \
            --services ${{ needs.terraform.outputs.ecs_frontend_service }} \
            --region ${{ env.AWS_REGION }}

      # --- Verify Deployment ---

      - name: Verify ECS service is running
        run: |
          echo "🔍 Verifying backend service..."
          BACKEND_STATUS=$(aws ecs describe-services \
            --cluster ${{ needs.terraform.outputs.ecs_cluster_name }} \
            --services ${{ needs.terraform.outputs.ecs_backend_service }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].deployments[0].runningCount' \
            --output text)
          echo "   Backend running tasks: $BACKEND_STATUS"

          echo "🔍 Verifying frontend service..."
          FRONTEND_STATUS=$(aws ecs describe-services \
            --cluster ${{ needs.terraform.outputs.ecs_cluster_name }} \
            --services ${{ needs.terraform.outputs.ecs_frontend_service }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].deployments[0].runningCount' \
            --output text)
          echo "   Frontend running tasks: $FRONTEND_STATUS"

          if [ "$BACKEND_STATUS" -ge 1 ] && [ "$FRONTEND_STATUS" -ge 1 ]; then
            echo "✅ All services are running!"
          else
            echo "❌ Service verification failed"
            exit 1
          fi

      - name: Deployment complete
        run: echo "✅ QuickCart successfully deployed to ECS Fargate!"
