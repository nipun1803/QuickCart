name: Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017

    env:
      # Keep existing integration env
      MONGODB_URI: mongodb://127.0.0.1:27017/testdb
      JWT_SECRET: testsecret
      GOOGLE_CLIENT_ID: test
      GOOGLE_CLIENT_SECRET: test
      NODE_ENV: test
      SESSION_SECRET: test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            tests/package-lock.json

      #
      # --- CI (backend/frontend/tests + artifact) ---
      #

      - name: Install Backend/Frontend/Test Dependencies
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend
          npm ci --prefix tests

      - name: Run Backend Unit Tests
        run: npm run test --prefix backend

      - name: Run Frontend Unit Tests
        run: npm run test --prefix frontend

      - name: Run Integration Tests
        run: npm run test:integration --prefix tests

      - name: Build Frontend
        run: npm run build --prefix frontend

      - name: Upload Frontend Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          if-no-files-found: error
          retention-days: 3

      #
      # --- CI_WORKFLOW Slack notify ---
      #
      - name: Slack Notify
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: '#all-github-actions'
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: 'CI Update | ${{ github.repository }}'
          SLACK_MESSAGE: '${{ job.status == ''success'' && ''🟢 CI PASSED'' || ''🔴 CI FAILED'' }} | Node: ${{ matrix.node-version }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>'
          SLACK_USERNAME: 'GitHub CI'
          SLACK_ICON_EMOJI: ':robot_face:'