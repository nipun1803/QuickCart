name: Deploy

on:
  push:
    branches: [ "docker" ]
  workflow_dispatch:

jobs:
  deploy:

  runs-on: ubuntu-latest



    steps:
    - uses: actions/checkout@v4
    - run: docker build . -t nipun1879/node20
    - run: echo "${{secrets.DOCKERHUB_PASSWORD}}" | docker login -u ${{secrets.DOCKERHUB_USERNAME}} --password-stdin
    - run: docker push ${{secrets.DOCKERHUB_USERNAME}}/node20:latest