name: Unit Tests

on:
  push:
    branches: [ main, new-feature, bugfix ]
  pull_request:
    branches: [ main, new-feature, bugfix ]
  workflow_dispatch:

jobs:
  test-unit:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      PORT: 5001
      MONGODB_URI: mongodb://127.0.0.1:27017/testdb
      JWT_SECRET: testsecret
      GOOGLE_CLIENT_ID: test
      GOOGLE_CLIENT_SECRET: test
      NODE_ENV: test
      SESSION_SECRET: test

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install Common Test Dependencies
        run: |
          cd tests
          npm ci

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Backend Unit Tests
        run: |
          cd backend
          npm test

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Unit Tests
        run: |
          cd frontend
          npm test
